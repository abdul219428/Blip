[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "blip"
version = "0.1.0"
description = "A global hotkey brain dump — press, type, gone."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pynput>=1.7",
]

[project.scripts]
blip = "blip:main"
