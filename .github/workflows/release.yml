name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/cogstash/
      - name: Run tests
        run: xvfb-run uv run pytest tests/ -v

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            exe_ext: .exe
            shell: pwsh
          - os: macos-latest
            artifact_suffix: macos
            exe_ext: ""
            shell: bash
          - os: ubuntu-latest
            artifact_suffix: linux
            exe_ext: ""
            shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress -y
        shell: pwsh
      - name: Build executables
        run: uv run python scripts/build.py
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          uv run python scripts/build_installer.py --compiler $compiler
        shell: pwsh
      - name: Smoke test onedir (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $binary = Get-ChildItem 'dist\CogStash-*-onedir\CogStash-*-onedir.exe' -File | Select-Object -First 1
          if (-not $binary) {
            throw "Could not find Windows onedir executable under dist\\CogStash-*-onedir\\CogStash-*-onedir.exe"
          }
          $help = (& $binary.FullName --help 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "--help exited with code $LASTEXITCODE for $($binary.FullName)"
          }
          if ($help -match 'Traceback') {
            throw "--help output unexpectedly contained Traceback for $($binary.FullName): [$help]"
          }
          if ($help -notmatch 'usage:') {
            throw "Expected readable --help output from $($binary.FullName), got: [$help]"
          }
          $version = (& $binary.FullName --version 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "--version exited with code $LASTEXITCODE for $($binary.FullName)"
          }
          if ($version -match 'Traceback') {
            throw "--version output unexpectedly contained Traceback for $($binary.FullName): [$version]"
          }
          if ($version -notmatch 'CogStash|cogstash|\d+\.\d+') {
            throw "Expected readable --version output from $($binary.FullName), got: [$version]"
          }
        shell: pwsh
      - name: Smoke test onefile (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          binary=$(find dist -maxdepth 1 -name 'CogStash-*' -type f ! -name '*onedir*' ! -name '*.tar.gz' ! -name '*.zip' | head -1)
          chmod +x "$binary"
          "$binary" --version
        shell: bash
      - name: Archive onedir bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/CogStash-*-onedir -DestinationPath dist/CogStash-${{ github.ref_name }}-windows.zip
        shell: pwsh
      - name: Archive onedir bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: cd dist && zip -r CogStash-${{ github.ref_name }}-macos.zip CogStash-*-onedir
        shell: bash
      - name: Archive onedir bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cd dist && tar -czf CogStash-${{ github.ref_name }}-linux.tar.gz CogStash-*-onedir
        shell: bash
      - name: Rename onefile for clarity
        run: |
          import glob, os
          version = os.environ.get("GITHUB_REF_NAME", "unknown")
          suffix = "${{ matrix.artifact_suffix }}"
          ext = "${{ matrix.exe_ext }}"
          pattern = f"dist/CogStash-*{ext}"
          for f in glob.glob(pattern):
              if "onedir" not in f and "setup" not in f and not f.endswith((".zip", ".tar.gz")):
                  target = f"dist/CogStash-{version}-{suffix}{ext}"
                  os.rename(f, target)
                  break
        shell: python
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cogstash-${{ matrix.artifact_suffix }}
          path: |
            dist/CogStash-*-${{ matrix.artifact_suffix }}*
      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cogstash-windows-installer
          path: dist/CogStash-v*-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Extract tag annotation
        id: tag_body
        run: |
          TAG_BODY=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CogStash ${{ github.ref_name }}
          body: ${{ steps.tag_body.outputs.body }}
          generate_release_notes: false
          files: artifacts/*
