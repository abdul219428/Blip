name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/cogstash/
      - name: Run tests
        run: xvfb-run uv run pytest tests/ -v --timeout=30

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            exe_ext: .exe
          - os: macos-latest
            artifact_suffix: macos
            exe_ext: ""
          - os: ubuntu-latest
            artifact_suffix: linux
            exe_ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Install Linux UI smoke-test dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress -y
        shell: pwsh
      - name: Build UI and CLI executables
        run: uv run python scripts/build.py --target both
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          uv run python scripts/build_installer.py --compiler $compiler
        shell: pwsh
      - name: Smoke test onedir (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $binary = Get-ChildItem 'dist\CogStash-*-onedir\CogStash-*-onedir.exe' -File | Select-Object -First 1
          if (-not $binary) {
            throw "Could not find Windows onedir executable under dist\\CogStash-*-onedir\\CogStash-*-onedir.exe"
          }
          $process = Start-Process -FilePath $binary.FullName -PassThru
          Start-Sleep -Seconds 5
          $process.Refresh()
          if ($process.HasExited) {
            throw "UI onedir exited early with code $($process.ExitCode) for $($binary.FullName)"
          }
          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id
          }
        shell: pwsh
      - name: Smoke test CLI onefile (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $binary = Get-ChildItem 'dist\CogStash-CLI-*.exe' -File | Select-Object -First 1
          if (-not $binary) {
            throw "Could not find Windows CLI executable under dist\\CogStash-CLI-*.exe"
          }
          $help = (& $binary.FullName --help 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "--help exited with code $LASTEXITCODE for $($binary.FullName)"
          }
          if ($help -match 'Traceback') {
            throw "--help output unexpectedly contained Traceback for $($binary.FullName): [$help]"
          }
          if ($help -notmatch 'usage:') {
            throw "Expected readable --help output from $($binary.FullName), got: [$help]"
          }
          $version = (& $binary.FullName --version 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "--version exited with code $LASTEXITCODE for $($binary.FullName)"
          }
          if ($version -match 'Traceback') {
            throw "--version output unexpectedly contained Traceback for $($binary.FullName): [$version]"
          }
          if ($version -notmatch 'CogStash|cogstash|\d+\.\d+') {
            throw "Expected readable --version output from $($binary.FullName), got: [$version]"
          }
        shell: pwsh
      - name: Smoke test UI onedir (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          binary=$(find dist -maxdepth 2 -path 'dist/CogStash-*-onedir/CogStash-*-onedir' -type f | head -1)
          if [ -z "$binary" ]; then
            echo "Could not find Unix onedir executable under dist/CogStash-*-onedir/CogStash-*-onedir"
            exit 1
          fi
          chmod +x "$binary"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            xvfb-run --auto-servernum "$binary" &
          else
            "$binary" &
          fi
          pid=$!
          sleep 5
          if kill -0 "$pid" 2>/dev/null; then
            kill "$pid"
            wait "$pid" || true
          else
            wait "$pid"
            exit_code=$?
            echo "UI onedir exited early with code $exit_code for $binary"
            echo "UI onedir should remain running during smoke test: $binary"
            exit 1
          fi
        shell: bash
      - name: Smoke test CLI onefile (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          binary=$(find dist -maxdepth 1 -name 'CogStash-CLI-*' -type f | head -1)
          if [ -z "$binary" ]; then
            echo "Could not find CLI executable under dist/CogStash-CLI-*"
            exit 1
          fi
          chmod +x "$binary"
          help_output=$("$binary" --help 2>&1)
          case "$help_output" in
            *Traceback*)
              echo "--help output unexpectedly contained Traceback: [$help_output]"
              exit 1
              ;;
          esac
          version_output=$("$binary" --version 2>&1)
          case "$version_output" in
            *Traceback*)
              echo "--version output unexpectedly contained Traceback: [$version_output]"
              exit 1
              ;;
          esac
        shell: bash
      - name: Archive onedir bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          import subprocess
          import sys

          sys.path.insert(0, "scripts")
          from _artifacts import get_release_archive_name

          archive_name = get_release_archive_name(tag="${{ github.ref_name }}", platform_suffix="windows")
          subprocess.run(["powershell", "-Command", f"Compress-Archive -Path dist/CogStash-*-onedir -DestinationPath dist/{archive_name}"], check=True)
        shell: python
      - name: Archive onedir bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          import subprocess
          import sys

          sys.path.insert(0, "scripts")
          from _artifacts import get_release_archive_name

          archive_name = get_release_archive_name(tag="${{ github.ref_name }}", platform_suffix="macos")
          subprocess.run(["bash", "-lc", f"cd dist && zip -r {archive_name} CogStash-*-onedir"], check=True)
        shell: python
      - name: Archive onedir bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          import subprocess
          import sys

          sys.path.insert(0, "scripts")
          from _artifacts import get_release_archive_name

          archive_name = get_release_archive_name(tag="${{ github.ref_name }}", platform_suffix="linux")
          subprocess.run(["bash", "-lc", f"cd dist && tar -czf {archive_name} CogStash-*-onedir"], check=True)
        shell: python
      - name: Rename onefile artifacts
        run: |
          import glob
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from _artifacts import get_executable_name

          suffix = "${{ matrix.artifact_suffix }}"
          ext = "${{ matrix.exe_ext }}"
          version = os.environ["GITHUB_REF_NAME"]
          dist_dir = Path("dist")

          ui_candidates = sorted(
              path for path in dist_dir.glob(f"CogStash-*{ext}") if "onedir" not in path.name and "setup" not in path.name and "CLI" not in path.name
          )
          cli_candidates = sorted(dist_dir.glob(f"CogStash-CLI-*{ext}"))
          if not ui_candidates:
              raise SystemExit("Could not find UI onefile artifact to rename")
          if not cli_candidates:
              raise SystemExit("Could not find CLI onefile artifact to rename")

          ui_target = dist_dir / f"{get_executable_name(target='ui', bundle_mode='onefile', version=version)}-{suffix}{ext}"
          cli_target = dist_dir / f"{get_executable_name(target='cli', bundle_mode='onefile', version=version)}-{suffix}{ext}"
          ui_candidates[0].replace(ui_target)
          cli_candidates[0].replace(cli_target)
        shell: python
      - name: Upload UI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cogstash-${{ matrix.artifact_suffix }}-ui
          path: |
            dist/CogStash-${{ github.ref_name }}-${{ matrix.artifact_suffix }}*
      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cogstash-${{ matrix.artifact_suffix }}-cli
          path: |
            dist/CogStash-CLI-${{ github.ref_name }}-${{ matrix.artifact_suffix }}*
      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: cogstash-windows-installer
          path: dist/CogStash-v*-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Extract tag annotation
        id: tag_body
        run: |
          TAG_BODY=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CogStash ${{ github.ref_name }}
          body: ${{ steps.tag_body.outputs.body }}
          generate_release_notes: false
          files: artifacts/*
